server:
  port: 8083

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:http://localhost:8888
  profiles:
    active: dev
  jpa:
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


